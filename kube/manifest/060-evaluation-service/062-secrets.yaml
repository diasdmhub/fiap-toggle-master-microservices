# Definição de variáveis de autenticação sensíveis por manifesto
##################################################
# RECOMENDA-SE DEFINIR OS SECRETS SEM O MANIFEST
#
# kubectl create secret generic auth-secrets \
#   --namespace=toggle \
#   --from-literal=SERVICE_API_KEY='API_KEY' \
#   --from-literal=REDIS_URL='rediss://cache-name....cache.amazonaws.com:6379' \
#   --annotation=description="Variáveis de autenticação sensíveis"
##################################################
apiVersion: v1
kind: Secret
metadata:
  name: evaluation-secrets
  namespace: toggle
  annotations:
    description: "Variáveis de autenticação sensíveis"
type: Opaque

# Chave codificada com Base64 -> echo -n 'valor' | base64
data:
  # Chave de API para o flag-service
  SERVICE_API_KEY:
  # URL do seu AWS ElastiCache com o schema "rediss://"
  REDIS_URL: